<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surplus Funds JV Partnership Application</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --primary-accent: #3b82f6;
            --secondary-accent: #8b5cf6;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            margin: 0 0 0.5rem 0;
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #cbd5e1;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .radio-group {
            display: flex;
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 400;
            cursor: pointer;
        }

        .radio-label input[type="radio"] {
            appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid var(--glass-border);
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.6);
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .radio-label input[type="radio"]:checked {
            border-color: var(--primary-accent);
        }

        .radio-label input[type="radio"]:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0.6rem;
            height: 0.6rem;
            background: var(--primary-accent);
            border-radius: 50%;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 1rem;
            font-family: 'Inter', sans-serif;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.6);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .success-message h2 {
            color: #4ade80;
            margin-bottom: 0.5rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="formContainer">
        <div class="header">
            <h1>Florida Tax Deed Leads JV Application</h1>
            <p>I pull 100% fresh, un-skip-traced Florida tax deed surplus leads. I'm looking for a hungry recovery partner for an 80/20 backend split. Apply below.</p>
        </div>

        <!-- 
        IMPORTANT: Replace the action URL below with your own Formspree endpoint.
        1. Go to formspree.io and create a free account.
        2. Create a new form and copy the endpoint URL.
        3. Paste it inside the action="" attribute below.
        -->
        <form id="jvForm" action="https://formspree.io/f/mwvjqybr" method="POST">
            
            <div class="form-group">
                <label for="name">Full Name or Agency Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com">
            </div>

            <div class="form-group">
                <label for="skiptrace">What Skip Tracing software do you currently use?</label>
                <input type="text" id="skiptrace" name="skiptrace_software" required placeholder="e.g. TruePeopleSearch, BatchSkipTracing, LexisNexis">
            </div>

            <div class="form-group">
                <label>Do you already have a Florida Attorney you use for claims?</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="has_attorney" value="Yes" required> Yes
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="has_attorney" value="No"> No, but I can find one
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="has_attorney" value="No"> No
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="hours">How many hours a week can you commit to cold calling these leads?</label>
                <select id="hours" name="weekly_hours" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="1-5 hours">1-5 hours (Part-time)</option>
                    <option value="10-20 hours">10-20 hours (Half-time)</option>
                    <option value="20-40 hours">20-40 hours (Full-time)</option>
                    <option value="40+ hours">40+ hours (Grinding)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="pitch">Why should I partner with you over anyone else? (Optional)</label>
                <textarea id="pitch" name="pitch" placeholder="Tell me about your hustle..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Application</button>
        </form>
    </div>

    <script>
        // Optional: Intercept form submission to show a nice success state instead of redirecting
        const form = document.getElementById('jvForm');
        const container = document.getElementById('formContainer');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    container.innerHTML = `
                        <div class="success-message" style="display: block;">
                            <h2>Application Sent!</h2>
                            <p>Thanks for applying. If you look like a good fit, I'll reach out to the email you provided shortly.</p>
                        </div>
                    `;
                }
            } catch (error) {
                alert('Oops! There was a problem submitting your form.');
            }
        });
    </script>
</body>
</html>
